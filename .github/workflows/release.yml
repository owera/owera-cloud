name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: build api binary + GitHub release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: api/go.mod
          cache: true
          cache-dependency-path: api/go.sum

      - name: go vet
        working-directory: api
        run: go vet ./...

      - name: go test
        working-directory: api
        run: go test -race ./...

      - name: build linux/amd64
        working-directory: api
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: "0"
        run: |
          go build \
            -ldflags "-s -w -X github.com/owera/owera-cloud/api/internal/version.Version=${GITHUB_REF_NAME}" \
            -o apiserver-linux-amd64 \
            ./cmd/apiserver

      - name: build linux/arm64
        working-directory: api
        env:
          GOOS: linux
          GOARCH: arm64
          CGO_ENABLED: "0"
        run: |
          go build \
            -ldflags "-s -w -X github.com/owera/owera-cloud/api/internal/version.Version=${GITHUB_REF_NAME}" \
            -o apiserver-linux-arm64 \
            ./cmd/apiserver

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            api/apiserver-linux-amd64
            api/apiserver-linux-arm64
          generate_release_notes: true
          draft: false
          prerelease: false
