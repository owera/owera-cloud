name: ci-web

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/ci-web.yml"
  pull_request:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/ci-web.yml"

permissions:
  contents: read

jobs:
  build:
    name: typecheck + lint + build (node-${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["20", "22"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: npm ci
        working-directory: web
        run: npm ci

      - name: typecheck
        working-directory: web
        run: npm run typecheck

      - name: lint
        working-directory: web
        run: npm run lint

      - name: build
        working-directory: web
        env:
          NEXT_TELEMETRY_DISABLED: "1"
        run: npm run build
