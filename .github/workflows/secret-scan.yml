name: secret-scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Run gitleaks directly from the upstream binary instead of
      # gitleaks/gitleaks-action@v2, which requires a paid GITLEAKS_LICENSE
      # for GitHub org accounts. The underlying scanner is the same; only
      # the action wrapper is gated.
      - name: install gitleaks
        run: |
          set -euo pipefail
          GITLEAKS_VERSION=8.18.4
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
          gitleaks version
      - name: run gitleaks
        run: gitleaks detect --source . --no-banner --redact --verbose
